name: Modular Nextflow CI (Multi-OS)

on:
  push:
    branches:
      - fastqc
      - trimmomatic
      - salmon
  pull_request:
    branches:
      - fastqc
      - trimmomatic
      - salmon

jobs:
  detect-module:
    runs-on: ubuntu-latest
    outputs:
      module: ${{ steps.set.outputs.module }}
      test_file: ${{ steps.set.outputs.test_file }}
      docker_tag: ${{ steps.set.outputs.docker_tag }}

    steps:
      - id: set
        run: |
          BRANCH=${GITHUB_REF##*/}

          if [[ "$BRANCH" == "fastqc" ]]; then
            echo "module=FASTQC" >> $GITHUB_OUTPUT
            echo "test_file=tests/fastqc.nf.test" >> $GITHUB_OUTPUT
            echo "docker_tag=hcemm/workshop-nextflow:fastqc" >> $GITHUB_OUTPUT
          elif [[ "$BRANCH" == "trimmomatic" ]]; then
            echo "module=TRIMMOMATIC" >> $GITHUB_OUTPUT
            echo "test_file=tests/trimmomatic.nf.test" >> $GITHUB_OUTPUT
            echo "docker_tag=hcemm/workshop-nextflow:trimmomatic" >> $GITHUB_OUTPUT
          elif [[ "$BRANCH" == "salmon" ]]; then
            echo "module=SALMON" >> $GITHUB_OUTPUT
            echo "test_file=tests/salmon.nf.test" >> $GITHUB_OUTPUT
            echo "docker_tag=hcemm/workshop-nextflow:salmon" >> $GITHUB_OUTPUT
          fi

  build-and-test:
    needs: detect-module

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        profile: [docker, conda]

        # prevent invalid combo of MacOS and docker
        exclude:
          - os: macos-latest
            profile: docker

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # -------------------------
      # Docker build (Linux only)
      # -------------------------
      - name: Login to Docker Hub
        if: matrix.profile == 'docker'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & push image
        if: matrix.profile == 'docker'
        uses: docker/build-push-action@v5
        with:
          context: ./docker/${{ github.ref_name }}
          push: true
          tags: ${{ needs.detect-module.outputs.docker_tag }}

      # -------------------------
      # Setup Java (Nextflow req)
      # -------------------------
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      # -------------------------
      # Install Nextflow
      # -------------------------
      - name: Install Nextflow
        run: |
          curl -s https://get.nextflow.io | bash
          sudo mv nextflow /usr/local/bin/

      # -------------------------
      # Conda (macOS or optional)
      # -------------------------
      - name: Setup Conda
        if: matrix.profile == 'conda'
        uses: conda-incubator/setup-miniconda@v3
        with:
          auto-activate-base: true
          channels: conda-forge,bioconda,defaults

      # -------------------------
      # Install nf-test
      # -------------------------
      - name: Install nf-test
        run: curl -fsSL https://get.nf-test.com | bash

      # -------------------------
      # Module test
      # -------------------------
      - name: Run nf-test (module)
        run: |
          ./nf-test test ${{ needs.detect-module.outputs.test_file }}

      # -------------------------
      # All together test
      # -------------------------
      - name: Run minimal pipeline
        run: |
          nextflow run . \
            -profile test,${{ matrix.profile }} \
            --input "tests/data/*.fastq.gz"