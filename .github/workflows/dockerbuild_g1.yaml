name: Build Group 1

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches:
      - main
      - docker-test
    # ⬇️ THE MAGIC TRICK: This action ONLY triggers if files in this folder change!
    paths:
      - 'containers/fastqc_g1/**' 

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          # ⬇️ Tells Docker to look inside Group 1's folder for the Dockerfile
          context: ./containers/fastqc_g1
          push: true
          tags: hcemm/bioinfo-workshop:fastqc  #one repo with different tags (or seperate repos...)