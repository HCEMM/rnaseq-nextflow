name: CI

on:
  push:
    branches: [ dev ]
  pull_request:
    branches: [ dev ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v1
      - name: Build and push
        uses: docker/build-push-action@v4
        with:
          context: .
          file: ./Dockerfile
          tags: upimapi:latest
          outputs: type=docker,dest=/tmp/upimapi.tar
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: upimapi
          path: /tmp/upimapi.tar

  txt-file-comma-separated:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: upimapi
          path: /tmp
      - name: Load Docker image
        run: docker load --input /tmp/upimapi.tar
      - name: IDs inputted through TXT file (comma-separated)
        run: docker run upimapi /bin/bash -c "upimapi -i UPIMAPI/cicd/ids.csv -cols 'Entry&KEGG&Interacts with&Taxonomic lineage (KINGDOM)&Taxonomic lineage (SPECIES)&Taxonomic lineage IDs (KINGDOM)&Taxonomic lineage IDs (SPECIES)'"
